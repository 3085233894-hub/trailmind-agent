services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trailmind-api
    command: >
      sh -c "mkdir -p /app/storage /app/outputs &&
             python -m app.rag.build_index &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./outputs:/app/outputs
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trailmind-frontend
    command: >
      sh -c "streamlit run frontend/streamlit_app.py
             --server.address=0.0.0.0
             --server.port=8501
             --server.headless=true"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - TRAILMIND_API_BASE_URL=http://api:8000
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    ports:
      - "8501:8501"
    volumes:
      - ./storage:/app/storage
      - ./outputs:/app/outputs
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  huggingface_cache:
